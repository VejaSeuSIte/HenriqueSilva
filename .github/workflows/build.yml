name: Build site

on:
  push:
    branches: [main]
    paths:
      - 'assets/landings-content.json'
      - 'assets/site-content.json'
      - 'blog/_posts/**'
      - 'blog/_layouts/**'
      - 'scripts/build_blog.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build
        run: python scripts/build_blog.py --inplace
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes after build."
          else
            git commit -m "build: regenerate static HTMLs [skip ci]"
            git push
          fi
      - name: Notify on failure (open issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Build falhou: ${context.sha.slice(0,7)}`;
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `O workflow de build do site falhou. O site público pode estar com conteúdo desatualizado.`,
              ``,
              `**Run:** ${url}`,
              `**Commit:** ${context.sha}`,
              `**Branch:** ${context.ref}`,
              ``,
              `Geralmente é causado por:`,
              `- JSON inválido em \`assets/landings-content.json\` ou \`assets/site-content.json\``,
              `- Markdown quebrado em \`blog/_posts/*.md\` (front-matter YAML)`,
              `- Erro no \`scripts/build_blog.py\``,
              ``,
              `Veja os logs do run pra detalhes.`,
            ].join('\n');
            // Procura issue aberta com mesmo título (evita duplicar)
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'build-failure', per_page: 50,
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Mais um build falhou: ${url}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['build-failure'],
              });
            }
